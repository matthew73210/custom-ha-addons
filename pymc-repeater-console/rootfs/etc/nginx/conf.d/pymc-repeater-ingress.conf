map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_x_ingress_path $ingress_prefix {
    "~^(.+)/$" $1;
    default $http_x_ingress_path;
    "" "";
}

map $request_uri $graph_loggable {
    default 0;
    ~^/api/(analytics|bulk_packets|filtered_packets|recent_packets|packet_type_graph_data|metrics_graph_data|noise_floor_history|packet_stats|stats) 1;
    ~^/ws/(packets|companion_frame) 1;
}

map $http_authorization $auth_seen {
    default present;
    "" absent;
}

map $arg_token $token_seen {
    default present;
    "" absent;
}

log_format graph_diag '$remote_addr "$request" $status $body_bytes_sent '
                      'auth=$auth_seen token=$token_seen upgrade=$http_upgrade '
                      'host="$host" xfp="$http_x_forwarded_prefix" '
                      'ua="$http_user_agent"';

server {
    listen 8000;
    listen 8080;
    server_name _;

    access_log /dev/stdout graph_diag if=$graph_loggable;
    error_log /dev/stderr warn;

    client_max_body_size 16m;
    proxy_buffering off;
    proxy_request_buffering off;

    location = /ha-ingress-proxy.js {
        default_type application/javascript;
        alias /opt/pymc_repeater/ha-ingress-proxy.js;
    }

    location = /ha-console-nav.js {
        default_type application/javascript;
        alias /opt/pymc_repeater/ha-console-nav.js;
    }

    location = /api/recent_packets {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix $http_x_ingress_path;
        proxy_set_header X-Ingress-Path $http_x_ingress_path;

        proxy_pass_request_headers on;
        proxy_pass_request_body on;
    }

    location = /api/bulk_packets {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix $http_x_ingress_path;
        proxy_set_header X-Ingress-Path $http_x_ingress_path;

        proxy_pass_request_headers on;
        proxy_pass_request_body on;
    }

    location = /api/filtered_packets {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix $http_x_ingress_path;
        proxy_set_header X-Ingress-Path $http_x_ingress_path;

        proxy_pass_request_headers on;
        proxy_pass_request_body on;
    }

    location ^~ /api/analytics/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix $http_x_ingress_path;
        proxy_set_header X-Ingress-Path $http_x_ingress_path;

        proxy_pass_request_headers on;
        proxy_pass_request_body on;
    }

    location = /repeater {
        return 302 $ingress_prefix/repeater/;
    }

    location ^~ /repeater/ {
        root /opt/pymc_repeater_original_web;
        try_files $uri $uri/ /repeater/index.html;

        sub_filter_once off;
        sub_filter_types application/javascript text/javascript;
        sub_filter '<head>' '<head><script src="$ingress_prefix/ha-ingress-proxy.js"></script><script src="$ingress_prefix/ha-console-nav.js"></script>';
        sub_filter 'href="/assets/' 'href="$ingress_prefix/repeater/assets/';
        sub_filter 'src="/assets/' 'src="$ingress_prefix/repeater/assets/';
        sub_filter 'href="/favicon.ico"' 'href="$ingress_prefix/repeater/favicon.ico"';
        sub_filter 'history:r(`/`),routes:' 'history:r(window.PyMCRepeaterBasePath||`/repeater/`),routes:';
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;

        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix $http_x_ingress_path;
        proxy_set_header X-Ingress-Path $http_x_ingress_path;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        proxy_pass_request_headers on;
        proxy_pass_request_body on;

        proxy_cookie_path / $ingress_prefix/;
        proxy_redirect http://127.0.0.1:8001/ $ingress_prefix/;
        proxy_redirect http://localhost:8001/ $ingress_prefix/;
        proxy_redirect / $ingress_prefix/;

        sub_filter_once off;
        sub_filter_types application/javascript text/javascript;
        sub_filter '<head>' '<head><script src="$ingress_prefix/ha-ingress-proxy.js"></script><script src="$ingress_prefix/ha-console-nav.js"></script>';
        sub_filter 'href="/' 'href="$ingress_prefix/';
        sub_filter 'src="/' 'src="$ingress_prefix/';
        sub_filter 'action="/' 'action="$ingress_prefix/';
        sub_filter 'history:r(`/`),routes:' 'history:r(window.PyMCIngressBasePath||`/`),routes:';
        sub_filter 'F.jsx(E7,{children:F.jsx(Die,{})})' 'F.jsx(E7,{basename:window.PyMCIngressBasePath||`/`,children:F.jsx(Die,{})})';
    }
}
