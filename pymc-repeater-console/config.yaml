name: "pyMC Repeater + Console"
slug: "pymc-repeater-console"
description: "pyMC_Repeater with pyMC Console dashboard"
version: "0.2.28-dev"
url: "https://github.com/matthew73210/custom-ha-addons/tree/main/pymc-repeater-console"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
image: "ghcr.io/matthew73210/pymc-repeater-console-{arch}"
startup: services
boot: auto
init: false
build_from:
  aarch64: "ghcr.io/home-assistant/aarch64-base-debian:bookworm"
  amd64: "ghcr.io/home-assistant/amd64-base-debian:bookworm"
  armhf: "ghcr.io/home-assistant/armhf-base-debian:bookworm"
  armv7: "ghcr.io/home-assistant/armv7-base-debian:bookworm"
  i386: "ghcr.io/home-assistant/i386-base-debian:bookworm"
panel_icon: "mdi:view-dashboard"
ingress: true
ingress_port: 8080
ingress_stream: true
webui: "http://[HOST]:[PORT:8080]"
ports:
  5000/tcp: null
  8000/tcp: null
  8080/tcp: null
ports_description:
  5000/tcp: "pyMC Companion frame server"
  8000/tcp: "Wrapper API and dashboard port; disabled by default because ingress uses the proxy"
  8080/tcp: "Optional ingress-compatible proxy access; disabled by default"
map:
  - type: addon_config
    read_only: false
apparmor: true
uart: true
usb: true
gpio: true
