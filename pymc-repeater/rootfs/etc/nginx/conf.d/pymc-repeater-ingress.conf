map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_x_ingress_path $ingress_prefix {
    "~^(.+)/$" $1;
    default $http_x_ingress_path;
    "" "";
}

server {
    listen 8080;
    server_name _;

    access_log off;
    error_log /dev/stderr warn;

    client_max_body_size 16m;
    proxy_buffering off;
    proxy_request_buffering off;

    location = /ha-ingress-proxy.js {
        default_type application/javascript;
        alias /opt/pymc_repeater/ha-ingress-proxy.js;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix $http_x_ingress_path;
        proxy_set_header X-Ingress-Path $http_x_ingress_path;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_pass_request_headers on;
        proxy_pass_request_body on;

        proxy_cookie_path / $ingress_prefix/;
        proxy_redirect http://127.0.0.1:8000/ $ingress_prefix/;
        proxy_redirect http://localhost:8000/ $ingress_prefix/;
        proxy_redirect / $ingress_prefix/;

        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript text/javascript application/json;
        sub_filter '</head>' '<script src="$ingress_prefix/ha-ingress-proxy.js"></script></head>';
        sub_filter 'href="/' 'href="$ingress_prefix/';
        sub_filter 'src="/' 'src="$ingress_prefix/';
        sub_filter 'action="/' 'action="$ingress_prefix/';
        sub_filter 'url(/assets/' 'url($ingress_prefix/assets/';
        sub_filter 'url(/static/' 'url($ingress_prefix/static/';
        sub_filter 'url(/images/' 'url($ingress_prefix/images/';
        sub_filter 'url(/img/' 'url($ingress_prefix/img/';
        sub_filter '`/assets/' '`$ingress_prefix/assets/';
        sub_filter '`/static/' '`$ingress_prefix/static/';
        sub_filter '`/images/' '`$ingress_prefix/images/';
        sub_filter '`/img/' '`$ingress_prefix/img/';
        sub_filter '"/assets/' '"$ingress_prefix/assets/';
        sub_filter '"/static/' '"$ingress_prefix/static/';
        sub_filter '"/images/' '"$ingress_prefix/images/';
        sub_filter '"/img/' '"$ingress_prefix/img/';
        sub_filter 'history:r(`/`),routes:' 'history:r(window.PyMCIngressBasePath||`/`),routes:';
        sub_filter 'function(e){return`/`+e}' 'function(e){return(window.PyMCIngressJoinAsset?window.PyMCIngressJoinAsset(e):`/`+e)}';
    }
}
