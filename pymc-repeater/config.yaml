name: "pyMC Repeater"
slug: "pymc-repeater"
description: "Python MeshCore repeater daemon for Home Assistant"
version: "0.1.0"
stage: experimental
url: "https://github.com/matthew73210/custom-ha-addons/tree/main/pymc-repeater"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
build_from:
  aarch64: "ghcr.io/home-assistant/aarch64-base-debian:bookworm"
  amd64: "ghcr.io/home-assistant/amd64-base-debian:bookworm"
panel_icon: "mdi:radio-tower"
webui: "http://[HOST]:[PORT:8000]"
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "pyMC Repeater dashboard"
map:
  - addon_config:rw
uart: true
usb: true
gpio: true
options:
  radio_type: "sx1262"
  region: "PAR"
  frequency_preset: "EU_868"
  kiss_port: "/dev/ttyUSB0"
  kiss_baud_rate: 115200
  admin_password: "change_me"
  config_yaml: ""
  log_level: "info"
schema:
  radio_type: list(sx1262|sx1262_ch341|kiss)
  region: str
  frequency_preset: list(EU_868|EU_868_LONG_RANGE|US_915|AU_915|NZ_917)
  kiss_port: str?
  kiss_baud_rate: int(1200,4000000)
  admin_password: password
  config_yaml: str?
  log_level: list(debug|info|warning|error)
