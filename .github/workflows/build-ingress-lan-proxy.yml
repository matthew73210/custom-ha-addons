name: Build Ingress LAN Proxy

on:
  push:
    branches:
      - main
    paths:
      - "ingress-lan-proxy/**"
      - ".github/workflows/build-ingress-lan-proxy.yml"
  pull_request:
    paths:
      - "ingress-lan-proxy/**"
      - ".github/workflows/build-ingress-lan-proxy.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  ADDON_DIR: ingress-lan-proxy
  IMAGE_OWNER: matthew73210
  IMAGE_NAME: ingress-lan-proxy

jobs:
  validate:
    name: Validate add-on source
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate YAML
        run: |
          ruby -ryaml -e 'YAML.load_file("ingress-lan-proxy/config.yaml"); puts "YAML ok: ingress-lan-proxy/config.yaml"'

      - name: Validate shell scripts
        run: |
          sh -n ingress-lan-proxy/rootfs/etc/cont-init.d/00-nginx-config
          sh -n ingress-lan-proxy/rootfs/etc/services.d/nginx/run

  build:
    name: Build add-on image (${{ matrix.arch }})
    needs:
      - validate
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base:3.21
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/base:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read add-on version
        id: addon
        run: |
          version="$(ruby -ryaml -e 'puts YAML.load_file(File.join(ENV.fetch("ADDON_DIR"), "config.yaml")).fetch("version")')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Add-on version: ${version}"

      - name: Debug Buildx
        run: |
          docker buildx ls
          docker buildx inspect --bootstrap

      - name: Check platform wiring
        env:
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
          BUILD_FROM: ${{ matrix.build_from }}
        run: |
          set -eu
          case "${ARCH}" in
            amd64) expected="linux/amd64" ;;
            aarch64) expected="linux/arm64" ;;
            *) echo "Unsupported arch: ${ARCH}" >&2; exit 1 ;;
          esac

          if [ "${PLATFORM}" != "${expected}" ]; then
            echo "Expected platform ${expected} for ${ARCH}, got ${PLATFORM}" >&2
            exit 1
          fi

          echo "Buildx platform for ${ARCH}: ${PLATFORM}"
          echo "Build base for ${ARCH}: ${BUILD_FROM}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build add-on
        uses: docker/build-push-action@v6
        with:
          context: ingress-lan-proxy
          file: ingress-lan-proxy/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.addon.outputs.version }}
            BUILD_FROM=${{ matrix.build_from }}
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:${{ steps.addon.outputs.version }}
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:latest
