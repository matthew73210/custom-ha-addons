name: Build pyMC Repeater Console Add-on

on:
  push:
    branches:
      - main
      - pymc-console
    paths:
      - ".github/workflows/build-pymc-repeater-console.yml"
      - "pymc-repeater-console/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  ADDON_DIR: pymc-repeater-console
  IMAGE_OWNER: matthew73210
  PYMC_REPEATER_REF: main
  PYMC_CONSOLE_REF: main

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base-debian:bookworm
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base-debian:bookworm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read add-on version
        id: addon
        run: |
          version="$(ruby -ryaml -e 'puts YAML.load_file(File.join(ENV.fetch("ADDON_DIR"), "config.yaml")).fetch("version")')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Add-on version: ${version}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push add-on image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.ADDON_DIR }}
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.addon.outputs.version }}
            PYMC_REPEATER_REF=${{ env.PYMC_REPEATER_REF }}
            PYMC_CONSOLE_REF=${{ env.PYMC_CONSOLE_REF }}
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/pymc-repeater-console-${{ matrix.arch }}:${{ steps.addon.outputs.version }}
            ghcr.io/${{ env.IMAGE_OWNER }}/pymc-repeater-console-${{ matrix.arch }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.addon.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.pymc_repeater.ref=${{ env.PYMC_REPEATER_REF }}
            org.opencontainers.image.pymc_console.ref=${{ env.PYMC_CONSOLE_REF }}
          cache-from: type=gha,scope=pymc-repeater-console-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=pymc-repeater-console-${{ matrix.arch }}
