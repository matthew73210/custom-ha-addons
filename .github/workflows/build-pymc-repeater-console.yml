name: Build pyMC Repeater Console Add-on

on:
  push:
    branches:
      - main
      - pymc-console
      - pymc-repeater-console
    paths:
      - ".github/workflows/build-pymc-repeater-console.yml"
      - "pymc-repeater-console/**"
  pull_request:
    paths:
      - ".github/workflows/build-pymc-repeater-console.yml"
      - ".github/workflows/check-pymc-upstream-mergeability.yml"
      - "pymc-repeater-console/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  ADDON_DIR: pymc-repeater-console
  IMAGE_OWNER: matthew73210
  PYMC_REPEATER_DEFAULT_REF: e17d1137ab2d2d5b86d03c99523272289b7688aa
  PYMC_CORE_DEFAULT_REF: 330e32d57b9321afd63c38e634fa076a5049afee
  PYMC_CONSOLE_DEFAULT_REF: 2d961cef1ae1a355eb06e34fba99788d9ffca44a

jobs:
  validate:
    name: Validate wrapper source
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate YAML and JSON metadata
        run: |
          ruby -ryaml -e 'ARGV.each { |p| YAML.load_file(p); puts "YAML ok: #{p}" }' \
            "${ADDON_DIR}/config.yaml" \
            "${ADDON_DIR}/tests/contract/fixtures/ci-safe-config.yaml" \
            ".github/workflows/build-pymc-repeater-console.yml" \
            ".github/workflows/check-pymc-upstream-mergeability.yml"
          ruby -rjson -e 'ARGV.each { |p| JSON.parse(File.read(p)); puts "JSON ok: #{p}" }' \
            "repository.json" \
            "${ADDON_DIR}/compatibility/known-good-upstreams.json" \
            "${ADDON_DIR}/compatibility/upstream-watch.json"

      - name: Check reviewed upstream pins remain aligned
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import re

          addon = pathlib.Path("pymc-repeater-console")
          manifest = json.loads((addon / "compatibility/upstream-watch.json").read_text(encoding="utf-8"))
          dockerfile = (addon / "Dockerfile").read_text(encoding="utf-8")
          workflow = pathlib.Path(".github/workflows/build-pymc-repeater-console.yml").read_text(encoding="utf-8")

          for upstream in manifest["upstreams"]:
              pinned_ref = upstream["pinned_ref"]
              docker_match = re.search(rf"^ARG {re.escape(upstream['ref_build_arg'])}=(\S+)$", dockerfile, re.MULTILINE)
              workflow_match = re.search(rf"^  {re.escape(upstream['release_workflow_env'])}: (\S+)$", workflow, re.MULTILINE)
              if not docker_match or docker_match.group(1) != pinned_ref:
                  raise SystemExit(f"Dockerfile {upstream['ref_build_arg']} does not match reviewed pin {pinned_ref}")
              if not workflow_match or workflow_match.group(1) != pinned_ref:
                  raise SystemExit(f"Workflow {upstream['release_workflow_env']} does not match reviewed pin {pinned_ref}")
              print(f"Aligned reviewed pin: {upstream['name']} {pinned_ref}")
          PY

      - name: Validate shell startup scripts
        run: |
          while IFS= read -r -d '' file; do
            echo "Shell syntax check: ${file}"
            bash -n "${file}"
          done < <(find "${ADDON_DIR}/rootfs/etc" -type f \( -name "*.sh" -o -name "run" -o -name "finish" \) -print0)

      - name: Validate Python syntax
        run: |
          python3 - <<'PY'
          import ast
          import pathlib

          roots = [
              pathlib.Path("pymc-repeater-console/rootfs/opt/pymc_repeater"),
              pathlib.Path("pymc-repeater-console/tests/contract"),
          ]
          for root in roots:
              for path in sorted(root.rglob("*.py")):
                  ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
                  print(f"Python syntax ok: {path}")
          PY

      - name: Check Home Assistant options remain config-file-only
        run: |
          python3 - <<'PY'
          import pathlib

          config = pathlib.Path("pymc-repeater-console/config.yaml").read_text(encoding="utf-8")
          forbidden = {
              "options",
              "schema",
              "node_name",
              "public_name",
              "latitude",
              "longitude",
              "country",
              "radio_type",
              "map_region",
              "frequency_preset",
              "frequency_hz",
              "tx_power",
              "bandwidth",
              "spreading_factor",
              "coding_rate",
              "sync_word",
              "preamble_length",
              "kiss_port",
              "kiss_baud_rate",
              "pymc_tcp_host",
              "pymc_tcp_port",
              "pymc_tcp_token",
              "pymc_tcp_connect_timeout",
              "pymc_tcp_lbt_enabled",
              "pymc_tcp_lbt_max_attempts",
              "admin_password",
              "glass_enabled",
              "glass_base_url",
              "glass_inform_interval_seconds",
              "log_level",
              "config_yaml",
          }
          for key in sorted(forbidden):
              needle = f"\n{key}:"
              if needle in config:
                  raise SystemExit(f"Forbidden Home Assistant runtime option is present in config.yaml: {key}")
          print("OK: config.yaml has no Home Assistant runtime options/schema")
          PY

      - name: Check runtime guard and CI contract fixture
        run: |
          guard="${ADDON_DIR}/rootfs/etc/cont-init.d/pymc-repeater.sh"
          fixture="${ADDON_DIR}/tests/contract/fixtures/ci-safe-config.yaml"
          if ! grep -q 'radio_type == "sx1262"' "${guard}"; then
            echo "ERROR: sx1262 runtime guard is missing"
            exit 1
          fi
          if ! grep -q "/dev/gpiochip0" "${guard}"; then
            echo "ERROR: sx1262 /dev/gpiochip0 guard is missing"
            exit 1
          fi
          if ! grep -q "Configured radio_type=sx1262 requires /dev/gpiochip0" "${guard}"; then
            echo "ERROR: expected sx1262 fatal message is missing"
            exit 1
          fi
          if grep -q "radio_type: sx1262" "${fixture}"; then
            echo "ERROR: CI contract fixture must not use hardware sx1262"
            exit 1
          fi
          if ! grep -q "radio_type: none" "${fixture}"; then
            echo "ERROR: CI contract fixture should use upstream-accepted no-radio mode"
            exit 1
          fi
          echo "OK: runtime guard remains, CI fixture is non-GPIO"

      - name: Check forbidden compat API routing is absent
        run: |
          if grep -R "127\\.0\\.0\\.1:8090" "${ADDON_DIR}/rootfs/etc/nginx" "${ADDON_DIR}/rootfs/etc/s6-overlay"; then
            echo "ERROR: forbidden compat API upstream 127.0.0.1:8090 was reintroduced"
            exit 1
          fi
          if grep -R "location = /api/recent_packets\\|location = /api/bulk_packets\\|location = /api/filtered_packets\\|location \\^~ /api/analytics/" "${ADDON_DIR}/rootfs/etc/nginx"; then
            echo "ERROR: forbidden wrapper-owned packet/analytics API routing was reintroduced"
            exit 1
          fi
          if find "${ADDON_DIR}/rootfs/etc/s6-overlay" -type f -print0 | xargs -0 grep -n "console_compat_api\\|pymc-console-compat-api"; then
            echo "ERROR: quarantined console_compat_api service was reintroduced into normal startup"
            exit 1
          fi
          echo "OK: normal API traffic is not routed to console_compat_api"

      - name: Check removed minified rewrite patterns are absent
        run: |
          if grep -R "history:r(window\\.PyMCIngressBasePath||\`/\`),routes:" "${ADDON_DIR}/rootfs/etc/nginx"; then
            echo "ERROR: removed Console history minified rewrite pattern was reintroduced"
            exit 1
          fi
          echo "OK: removed minified rewrite pattern is absent"

      - name: Check upstream source is not patched by build scripts
        run: |
          if grep -R -nE "sed -i|perl -pi|patch -p|apply_patch" "${ADDON_DIR}/Dockerfile" "${ADDON_DIR}/rootfs"; then
            echo "ERROR: build/startup scripts appear to patch upstream files"
            exit 1
          fi
          echo "OK: no upstream patch commands found"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Check Dockerfile can be parsed
        run: |
          docker buildx build --check \
            --build-arg BUILD_FROM=debian:bookworm-slim \
            --build-arg BUILD_ARCH=amd64 \
            --build-arg BUILD_VERSION=ci-check \
            --build-arg PYMC_REPEATER_REF="${PYMC_REPEATER_DEFAULT_REF}" \
            --build-arg PYMC_CORE_REF="${PYMC_CORE_DEFAULT_REF}" \
            --build-arg PYMC_CONSOLE_REF="${PYMC_CONSOLE_DEFAULT_REF}" \
            -f "${ADDON_DIR}/Dockerfile" \
            "${ADDON_DIR}"

  contract-tests:
    name: Run contract tests against default upstream image
    runs-on: ubuntu-latest
    needs:
      - validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install contract test dependencies
        run: python3 -m pip install --upgrade pytest

      - name: Read add-on version
        id: addon
        run: |
          version="$(ruby -ryaml -e 'puts YAML.load_file(File.join(ENV.fetch("ADDON_DIR"), "config.yaml")).fetch("version")')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Add-on version: ${version}"

      - name: Run source-level contract tests
        run: |
          PYMC_REPEATER_CONSOLE_SKIP_DOCKER=1 \
            python3 -m pytest -vv "${ADDON_DIR}/tests/contract"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build default upstream image for contract tests
        run: |
          docker build \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base-debian:bookworm \
            --build-arg BUILD_ARCH=amd64 \
            --build-arg BUILD_VERSION="${{ steps.addon.outputs.version }}" \
            --build-arg PYMC_REPEATER_REF="${PYMC_REPEATER_DEFAULT_REF}" \
            --build-arg PYMC_CORE_REF="${PYMC_CORE_DEFAULT_REF}" \
            --build-arg PYMC_CONSOLE_REF="${PYMC_CONSOLE_DEFAULT_REF}" \
            -t pymc-repeater-console:contract-default \
            -f "${ADDON_DIR}/Dockerfile" \
            "${ADDON_DIR}"

      - name: Create CI-safe contract config fixture
        id: contract_config
        run: |
          config_dir="${RUNNER_TEMP}/pymc-contract-config"
          mkdir -p "${config_dir}/pymc-repeater"
          cp "${ADDON_DIR}/tests/contract/fixtures/ci-safe-config.yaml" "${config_dir}/pymc-repeater/config.yaml"
          ruby -ryaml -e 'YAML.load_file(ARGV.fetch(0)); puts "YAML ok: #{ARGV.fetch(0)}"' "${config_dir}/pymc-repeater/config.yaml"
          if grep -q "radio_type: sx1262" "${config_dir}/pymc-repeater/config.yaml"; then
            echo "ERROR: CI contract config must not use hardware sx1262"
            exit 1
          fi
          echo "config_dir=${config_dir}" >> "${GITHUB_OUTPUT}"
          echo "CI contract config: ${config_dir}/pymc-repeater/config.yaml"

      - name: Show default upstream build metadata
        run: |
          docker run --rm \
            -v "${{ steps.contract_config.outputs.config_dir }}:/config:ro" \
            --entrypoint python3 \
            pymc-repeater-console:contract-default \
            -m json.tool /usr/share/pymc-repeater-console/upstream-build-info.json

      - name: Run live contract tests against default upstream image
        env:
          PYMC_REPEATER_CONSOLE_IMAGE: pymc-repeater-console:contract-default
          PYMC_REPEATER_CONSOLE_CONFIG_DIR: ${{ steps.contract_config.outputs.config_dir }}
          PYMC_REPEATER_CONSOLE_TEST_TIMEOUT: "90"
        run: python3 -m pytest -vv "${ADDON_DIR}/tests/contract"

      - name: Show container logs on contract failure
        if: failure()
        run: |
          docker ps -a --filter "name=pymc-contract-" --format "{{.Names}}" | while read -r name; do
            echo "::group::${name} logs"
            docker logs "${name}" || true
            echo "::endgroup::"
          done

  build:
    name: Build and publish default upstream image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs:
      - validate
      - contract-tests
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base-debian:bookworm
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base-debian:bookworm

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read add-on version
        id: addon
        run: |
          version="$(ruby -ryaml -e 'puts YAML.load_file(File.join(ENV.fetch("ADDON_DIR"), "config.yaml")).fetch("version")')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Add-on version: ${version}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show default upstream refs
        run: |
          echo "Publishing from default upstream refs."
          echo "PYMC_REPEATER_REF=${PYMC_REPEATER_DEFAULT_REF}"
          echo "PYMC_CORE_REF=${PYMC_CORE_DEFAULT_REF}"
          echo "PYMC_CONSOLE_REF=${PYMC_CONSOLE_DEFAULT_REF}"

      - name: Build and push default add-on image
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.ADDON_DIR }}
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.addon.outputs.version }}
            PYMC_REPEATER_REF=${{ env.PYMC_REPEATER_DEFAULT_REF }}
            PYMC_CORE_REF=${{ env.PYMC_CORE_DEFAULT_REF }}
            PYMC_CONSOLE_REF=${{ env.PYMC_CONSOLE_DEFAULT_REF }}
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/pymc-repeater-console-${{ matrix.arch }}:${{ steps.addon.outputs.version }}
            ghcr.io/${{ env.IMAGE_OWNER }}/pymc-repeater-console-${{ matrix.arch }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.addon.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.pymc_repeater.ref=${{ env.PYMC_REPEATER_DEFAULT_REF }}
            org.opencontainers.image.pymc_core.ref=${{ env.PYMC_CORE_DEFAULT_REF }}
            org.opencontainers.image.pymc_console.ref=${{ env.PYMC_CONSOLE_DEFAULT_REF }}
          cache-from: type=gha,scope=pymc-repeater-console-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=pymc-repeater-console-${{ matrix.arch }}
